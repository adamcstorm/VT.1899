# DISCLAIMER: This macro was developed with the assistance of an AI language
# model (Claude by Anthropic / Gemini by Google).
# Use at your own risk — always supervise your printer during the first run
# and ensure safe Z clearance before executing any automated movement macros.
# =============================================================================


# ─────────────────────────────────────────────────────────────────────────────
# NOTE: If [gcode_macro _User_Variables] is defined in another file with
#   variable_debug: False
# verbose output will be disabled. If it is not defined, debug output is
# enabled by default.
# ─────────────────────────────────────────────────────────────────────────────


# ─────────────────────────────────────────────────────────────────────────────
# Shared state — all runtime variables declared here
# ─────────────────────────────────────────────────────────────────────────────
[gcode_macro _PROBE_SCAN_STATE]
variable_min_x:            10   # remembers start position for retry
variable_y_retries:        0     # tracks how many times we've fallen back
variable_y_fallback:       0.25  # fallback distance (mm) if probe is not found
variable_max_scans:        6     # total number of scan passes allowed
variable_max_x:            0.0
variable_max_y:            0.0
variable_fine_sum:         0.0
variable_fine_count:       0
variable_fine_found:       0     # 0 = not yet detected, 1 = detected at least once
variable_fine_start_x:     0.0   # X position where probe was first detected in fine scan
variable_dock_window:      5.0
variable_dock_sensitivity: 10
variable_fine_step:        0.75
variable_dock_x:           0.0   # populated by _PROBE_SCAN_REPORT
variable_dock_speed:       50.0  # Default 50mm/s; populated by param or _PROBE_SPEED_REPORT
variable_current_x:        0.0   # loop cursor for position scan
variable_current_speed:    0.0   # loop cursor for speed scan
variable_speed_end:        0.0
variable_speed_step:       0.0
gcode: # intentionally empty — storage only


# ─────────────────────────────────────────────────────────────────────────────
# ENTRY POINT — position scan
# Optional params: MIN_X, MAX_X, ARROUND, DOCK_SPEED, Y_FALLBACK, MAX_SCANS
# Examples:
#   ATTACH_PROBE_SCAN
#   ATTACH_PROBE_SCAN MIN_X=10 MAX_X=50
#   ATTACH_PROBE_SCAN ARROUND=150
#   ATTACH_PROBE_SCAN ARROUND=150 MAX_SCANS=8
#   ATTACH_PROBE_SCAN Y_FALLBACK=0.5 MAX_SCANS=3
#   ATTACH_PROBE_SCAN DOCK_SPEED=40
#   ATTACH_PROBE_SCAN ARROUND=150 MAX_SCANS=4 Y_FALLBACK=0.25 DOCK_SPEED=50
# ─────────────────────────────────────────────────────────────────────────────
[gcode_macro ATTACH_PROBE_SCAN]
description: Scan X axis to find dock. Ex: ATTACH_PROBE_SCAN ARROUND=150 MAX_SCANS=4 Y_FALLBACK=0.25 DOCK_SPEED=50
gcode:
    # Query probe state first, then forward all parameters to the executor
    QUERY_PROBE
    QUERY_PROBE
    _ATTACH_PROBE_SCAN_EXEC {rawparams}


[gcode_macro _ATTACH_PROBE_SCAN_EXEC]
gcode:
    {% if "x" not in printer.toolhead.homed_axes or "y" not in printer.toolhead.homed_axes %}
        { action_raise_error("X and Y must be homed before running this macro") }
    {% endif %}

    # Pre-flight check — probe must not already be attached before scanning
    {% if printer.probe.last_query == 0 %}
        { action_raise_error("Probe is already attached — detach it before running ATTACH_PROBE_SCAN") }
    {% endif %}

    {% set axis_min_x = printer.toolhead.axis_minimum.x %}
    {% set axis_max_x = printer.toolhead.axis_maximum.x %}
    {% set max_y      = printer.toolhead.axis_maximum.y %}

    # Handle the ARROUND parameter with clamping
    {% if params.ARROUND is defined %}
        {% set arround_val = params.ARROUND | float %}
        {% set min_x = [arround_val - 25.0, axis_min_x] | max %}
        {% set max_x = [arround_val + 25.0, axis_max_x] | min %}
    {% else %}
        {% set min_x = params.MIN_X | default(0.0) | float %}
        {% set max_x = params.MAX_X | default(axis_max_x) | float %}
    {% endif %}

    {% set y_fallback = params.Y_FALLBACK | default(0.25) | float %}
    {% set max_scans  = params.MAX_SCANS | default(6) | int %}
    
    # Default docking speed is now 50mm/s
    {% set dock_speed = params.DOCK_SPEED | default(50.0) | float %}

    {% if min_x < axis_min_x %}
        { action_raise_error("MIN_X=%.2f is below the printer's axis minimum (%.2f)" % (min_x, axis_min_x)) }
    {% endif %}
    {% if max_x > axis_max_x %}
        { action_raise_error("MAX_X=%.2f exceeds the printer's axis maximum (%.2f)" % (max_x, axis_max_x)) }
    {% endif %}
    {% if min_x >= max_x %}
        { action_raise_error("MIN_X=%.2f must be less than MAX_X=%.2f" % (min_x, max_x)) }
    {% endif %}
    {% if y_fallback < 0 %}
        { action_raise_error("Y_FALLBACK must be 0 or greater") }
    {% endif %}
    {% if max_scans < 1 %}
        { action_raise_error("MAX_SCANS must be at least 1") }
    {% endif %}
    {% if dock_speed <= 0 %}
        { action_raise_error("DOCK_SPEED must be greater than 0") }
    {% endif %}

    {% set dock_window      = 5.0 %}
    {% set dock_sensitivity = 10 %}
    {% set fine_step        = dock_window / dock_sensitivity %}

    SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=min_x              VALUE={min_x}
    SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=y_retries          VALUE=0
    SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=y_fallback         VALUE={y_fallback}
    SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=max_scans          VALUE={max_scans}
    SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=max_x              VALUE={max_x}
    SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=max_y              VALUE={max_y}
    SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=dock_speed         VALUE={dock_speed}
    SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=fine_sum           VALUE=0.0
    SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=fine_count         VALUE=0
    SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=fine_found         VALUE=0
    SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=fine_start_x       VALUE=0.0
    SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=dock_window        VALUE={dock_window}
    SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=dock_sensitivity   VALUE={dock_sensitivity}
    SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=fine_step          VALUE={fine_step}
    SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=current_x          VALUE={min_x}

    # Always shown — marks the start of the scan for the user
    { action_respond_info(
        "Starting coarse scan — dock_window=%.1fmm, dock_sensitivity=%d, fine_step=%.2fmm, X: %.1f → %.1f%s (dock_speed=%.0f mm/s) (y_fallback=%.2f mm, max_scans=%d)"
        % (dock_window, dock_sensitivity, fine_step, min_x, max_x,
           " (around %.1f)" % params.ARROUND | float if params.ARROUND is defined else (" (custom range)" if (params.MIN_X is defined or params.MAX_X is defined) else ""),
           dock_speed, y_fallback, max_scans)
    ) }

    UPDATE_DELAYED_GCODE ID=_PROBE_SCAN_COARSE_LOOP DURATION=0.01


# ─────────────────────────────────────────────────────────────────────────────
# PHASE 1 — coarse loop: dock_window mm steps until first detection
# ─────────────────────────────────────────────────────────────────────────────
[delayed_gcode _PROBE_SCAN_COARSE_LOOP]
initial_duration: 0
gcode:
    {% set state   = printer["gcode_macro _PROBE_SCAN_STATE"] %}
    {% set x       = state.current_x %}
    {% set max_x   = state.max_x %}
    {% set max_y   = state.max_y %}
    {% set x_speed = printer.configfile.settings.stepper_x.homing_speed * 60 %}
    {% set dock_f  = state.dock_speed * 60 %}

    {% if x > max_x %}
        {% if state.y_retries < (state.max_scans - 1) and state.y_fallback > 0 %}
            { action_respond_info("Coarse scan exhausted at Y=%.2f. Retrying at Y=%.2f (Scan %d of %d)..." % (max_y, max_y - state.y_fallback, state.y_retries + 2, state.max_scans)) }
            SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=max_y VALUE={max_y - state.y_fallback}
            SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=current_x VALUE={state.min_x}
            SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=y_retries VALUE={state.y_retries + 1}
            UPDATE_DELAYED_GCODE ID=_PROBE_SCAN_COARSE_LOOP DURATION=0.01
        {% else %}
            { action_raise_error("Coarse scan exhausted — probe not found across full X range after %d scan(s)!" % state.max_scans) }
        {% endif %}
    {% else %}
        G0 X{x} Y{max_y - 20} F{x_speed}
        G0 X{x} Y{max_y}      F{dock_f}
        QUERY_PROBE
        QUERY_PROBE
        G0 X{x} Y{max_y - 20} F{dock_f}  # <--- Undock at 50mm/s
        _PROBE_SCAN_COARSE_CHECK
    {% endif %}


[gcode_macro _PROBE_SCAN_COARSE_CHECK]
gcode:
    {% set debug = printer["gcode_macro _User_Variables"].debug if "gcode_macro _User_Variables" in printer else True %}
    {% set state = printer["gcode_macro _PROBE_SCAN_STATE"] %}
    {% set x     = state.current_x %}

    {% if printer.probe.last_query == 0 %}
        {% set fine_start = [x - state.dock_window, printer.toolhead.axis_minimum.x] | max %}
        {% if debug %}
            { action_respond_info(
                "Coarse: probe detected at X=%.1f — rewinding to X=%.2f for fine scan (step=%.2fmm)"
                % (x, fine_start, state.fine_step)
            ) }
        {% endif %}
        SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=current_x VALUE={fine_start}
        UPDATE_DELAYED_GCODE ID=_PROBE_SCAN_FINE_LOOP DURATION=0.01
    {% else %}
        {% if debug %}
            { action_respond_info("Coarse: no probe at X=%.1f — stepping %.1fmm..." % (x, state.dock_window)) }
        {% endif %}
        SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=current_x VALUE={x + state.dock_window}
        UPDATE_DELAYED_GCODE ID=_PROBE_SCAN_COARSE_LOOP DURATION=0.01
    {% endif %}


# ─────────────────────────────────────────────────────────────────────────────
# PHASE 2 — fine loop: fine_step mm steps, accumulate until probe is lost
#           limited to dock_window * 1.25 mm from first detection
# ─────────────────────────────────────────────────────────────────────────────
[delayed_gcode _PROBE_SCAN_FINE_LOOP]
initial_duration: 0
gcode:
    {% set debug      = printer["gcode_macro _User_Variables"].debug if "gcode_macro _User_Variables" in printer else True %}
    {% set state      = printer["gcode_macro _PROBE_SCAN_STATE"] %}
    {% set x          = state.current_x %}
    {% set max_x      = state.max_x %}
    {% set max_y      = state.max_y %}
    {% set x_speed    = printer.configfile.settings.stepper_x.homing_speed * 60 %}
    {% set dock_f     = state.dock_speed * 60 %}
    {% set fine_limit = state.fine_start_x + state.dock_window * 1.25 if state.fine_found == 1 else max_x %}

    {% if state.fine_found == 1 and x > fine_limit %}
        {% if debug %}
            { action_respond_info("Fine scan exceeded dock window limit (%.2fmm) at X=%.2f — ending scan" % (fine_limit, x)) }
        {% endif %}
        _PROBE_SCAN_REPORT
    {% elif x > max_x %}
        {% if debug %}
            { action_respond_info("Fine scan reached max X while probe still attached.") }
        {% endif %}
        _PROBE_SCAN_REPORT
    {% else %}
        G0 X{x} Y{max_y - 20} F{x_speed}
        G0 X{x} Y{max_y}      F{dock_f}
        QUERY_PROBE
        QUERY_PROBE
        {% if state.fine_count != 0 %}
            {% set avg_x = state.fine_sum / state.fine_count %}
            G0 X{avg_x} Y{max_y}      F{x_speed} 
            G0 X{avg_x} Y{max_y - 20} F{dock_f}  # <--- Undock at 50mm/s
        {% endif %}
        G0 X{x} Y{max_y - 20} F{dock_f}          # <--- Undock at 50mm/s
        _PROBE_SCAN_FINE_CHECK
    {% endif %}


[gcode_macro _PROBE_SCAN_END_CHECK]
gcode:
    {% set debug = printer["gcode_macro _User_Variables"].debug if "gcode_macro _User_Variables" in printer else True %}
    {% if printer.probe.last_query == 0 %}
        {% if debug %}
            { action_respond_info("Fine: probe still attached, finishing scan") }
        {% endif %}
        _PROBE_SCAN_REPORT
    {% endif %}


[gcode_macro _PROBE_SCAN_FINE_CHECK]
gcode:
    {% set debug = printer["gcode_macro _User_Variables"].debug if "gcode_macro _User_Variables" in printer else True %}
    {% set state = printer["gcode_macro _PROBE_SCAN_STATE"] %}
    {% set x     = state.current_x %}

    {% if printer.probe.last_query == 0 %}
        # First detection — record the X where the probe was first seen
        {% if state.fine_found == 0 %}
            SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=fine_start_x VALUE={x}
        {% endif %}
        # Probe detected — record position and mark as found
        SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=fine_sum   VALUE={state.fine_sum   + x}
        SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=fine_count VALUE={state.fine_count + 1}
        SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=fine_found VALUE=1
        {% if debug %}
            { action_respond_info("Fine: probe detected at X=%.2f" % x) }
        {% endif %}
        QUERY_PROBE
        QUERY_PROBE
        _PROBE_SCAN_END_CHECK
        SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=current_x VALUE={x + state.fine_step}
        UPDATE_DELAYED_GCODE ID=_PROBE_SCAN_FINE_LOOP DURATION=0.01
    {% elif state.fine_found == 0 %}
        # Not detected yet — still approaching the dock window, keep stepping
        {% if debug %}
            { action_respond_info("Fine: no probe yet at X=%.2f — still approaching..." % x) }
        {% endif %}
        SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=current_x VALUE={x + state.fine_step}
        UPDATE_DELAYED_GCODE ID=_PROBE_SCAN_FINE_LOOP DURATION=0.01
    {% else %}
        # Was detected before, now lost — dock window has ended
        {% if debug %}
            { action_respond_info("Fine: probe lost at X=%.2f — dock window ended" % x) }
        {% endif %}
        _PROBE_SCAN_REPORT
    {% endif %}


# ─────────────────────────────────────────────────────────────────────────────
# REPORT — saves dock_x to runtime state
# ─────────────────────────────────────────────────────────────────────────────
[gcode_macro _PROBE_SCAN_REPORT]
gcode:
    {% set state = printer["gcode_macro _PROBE_SCAN_STATE"] %}

    {% if state.fine_count == 0 %}
        { action_raise_error("Fine scan recorded zero detections — something went wrong.") }
    {% else %}
        {% set avg_x = state.fine_sum / state.fine_count %}
        {% set max_y = state.max_y %}
        SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=dock_x VALUE={avg_x}
        { action_respond_info(
            "━━━ Position Scan Complete ━━━\n"
            "Dock window  : %.1f mm\n"
            "Sensitivity  : %d\n"
            "Fine step    : %.2f mm\n"
            "Detections   : %d positions\n"
            "Average X    : %.2f mm\n"
            "Final Y      : %.2f mm\n"
            "\n"
            "Add the following to your dockable_probe section on Kalico:\n"
            "approach_position: %.2f, %.2f\n"
            "dock_position:     %.2f, %.2f\n"
            "extract_position:  %.2f, %.2f\n"
            "detach_position:   %.2f, %.2f\n"
            "\n"
            "Or add the following to your klicky-variables.cfg (Array format):\n"
            "variable_dock_position:     [%.2f, %.2f, -128]\n"
            "variable_approach_position: [%.2f, %.2f, 0]\n"
            "variable_extract_position:  [%.2f, %.2f, 0]\n"
            "variable_safe_dockaccess:   [%.2f, %.2f, 0]\n"
            "\n"
            "Or add the following to your klicky-variables.cfg (Standard format):\n"
            "variable_docklocation_x:    %.2f\n"
            "variable_docklocation_y:    %.2f\n"
            "variable_docklocation_z:    -128.0\n"
            "variable_dockmove_x:        18.0\n"
            "variable_dockmove_y:        0.0\n"
            "variable_dockmove_z:        0.0\n"
            "variable_attachmove_x:      0.0\n"
            "variable_attachmove_y:      -20.0\n"
            "variable_attachmove_z:      0.0\n"
            "variable_attachmove2_x:     18.0\n"
            "variable_attachmove2_y:     -20.0\n"
            "variable_attachmove2_z:     0.0\n"
            "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━" % (
                state.dock_window, state.dock_sensitivity,
                state.fine_step, state.fine_count, avg_x, max_y,
                # Kalico Values
                avg_x,       max_y - 20,
                avg_x,       max_y,
                avg_x + 18,  max_y,
                avg_x,       max_y - 20,
                # Klicky Values (Array)
                avg_x,       max_y,
                avg_x,       max_y - 20,
                avg_x + 18,  max_y,
                avg_x + 18,  max_y - 20,
                # Klicky Values (Standard Component)
                avg_x,       max_y)
        ) }
    {% endif %}


# ─────────────────────────────────────────────────────────────────────────────
# ENTRY POINT — speed scan
# Run ATTACH_PROBE_SCAN first so dock_x is populated
# Optional params: SPEED_START, SPEED_END, SPEED_STEP
# Examples:
#   ATTACH_PROBE_SPEED_SCAN
#   ATTACH_PROBE_SPEED_SCAN SPEED_START=20 SPEED_END=200 SPEED_STEP=10
# ─────────────────────────────────────────────────────────────────────────────
[gcode_macro ATTACH_PROBE_SPEED_SCAN]
description: Find minimum dock speed for Klicky, sets dock_speed = min + 15 mm/s
gcode:
    # Query probe state first, then forward parameters to executor
    QUERY_PROBE
    QUERY_PROBE
    _ATTACH_PROBE_SPEED_SCAN_EXEC {rawparams}


[gcode_macro _ATTACH_PROBE_SPEED_SCAN_EXEC]
gcode:
    {% if "x" not in printer.toolhead.homed_axes or "y" not in printer.toolhead.homed_axes %}
        { action_raise_error("X and Y must be homed before running this macro") }
    {% endif %}

    # Pre-flight check — probe must not already be attached before scanning
    {% if printer.probe.last_query == 0 %}
        { action_raise_error("Probe is already attached — detach it before running ATTACH_PROBE_SPEED_SCAN") }
    {% endif %}

    {% set state = printer["gcode_macro _PROBE_SCAN_STATE"] %}
    
    # Initialize max_y for speed tests independently
    {% set max_y = printer.toolhead.axis_maximum.y %}
    SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=max_y VALUE={max_y}

    # Find dock X coordinate hierarchy (Kalico -> Klicky -> Recent Scan State)
    {% set dock_x_val = 0.0 %}
    {% set found_dock = False %}
    
    {% if printer.configfile.settings.dockable_probe is defined and printer.configfile.settings.dockable_probe.dock_position is defined %}
        {% set raw_dock = printer.configfile.settings.dockable_probe.dock_position %}
        {% if raw_dock is iterable and raw_dock is not string %}
            {% set dock_x_val = raw_dock[0] | float %}
        {% else %}
            {% set dock_x_val = (raw_dock | string).split(',')[0] | replace('[', '') | float %}
        {% endif %}
        {% set found_dock = True %}
        { action_respond_info("Speed scan targeting Kalico dockable_probe X: %.2f" % dock_x_val) }
        
    {% elif printer["gcode_macro _User_Variables"] is defined and printer["gcode_macro _User_Variables"].dock_position is defined %}
        {% set raw_dock = printer["gcode_macro _User_Variables"].dock_position %}
        {% if raw_dock is iterable and raw_dock is not string %}
            {% set dock_x_val = raw_dock[0] | float %}
        {% else %}
            {% set dock_x_val = (raw_dock | string).split(',')[0] | replace('[', '') | float %}
        {% endif %}
        {% set found_dock = True %}
        { action_respond_info("Speed scan targeting Klicky _User_Variables X: %.2f" % dock_x_val) }
        
    {% elif state.dock_x != 0.0 %}
        {% set dock_x_val = state.dock_x %}
        {% set found_dock = True %}
        { action_respond_info("Speed scan targeting recent ATTACH_PROBE_SCAN X: %.2f" % dock_x_val) }
    {% endif %}

    {% if not found_dock %}
        { action_raise_error("Dock X coordinate is unknown. Configure Kalico/Klicky variables or run ATTACH_PROBE_SCAN first.") }
    {% endif %}

    SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=dock_x VALUE={dock_x_val}

    {% set speed_start = params.SPEED_START | default(25.0) | float %}
    {% set speed_end   = params.SPEED_END | default(300.0) | float %}
    {% set speed_step  = params.SPEED_STEP | default(15.0) | float %}

    {% if speed_start <= 0 %}
        { action_raise_error("SPEED_START must be greater than 0") }
    {% endif %}
    {% if speed_step <= 0 %}
        { action_raise_error("SPEED_STEP must be greater than 0") }
    {% endif %}
    {% if speed_start >= speed_end %}
        { action_raise_error("SPEED_START must be less than SPEED_END") }
    {% endif %}

    SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=current_speed VALUE={speed_start}
    SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=speed_end     VALUE={speed_end}
    SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=speed_step    VALUE={speed_step}

    # Always shown — marks the start of the scan for the user
    { action_respond_info(
        "Starting speed scan at dock_x=%.2f — %.0f → %.0f mm/s in %.0f mm/s steps"
        % (dock_x_val, speed_start, speed_end, speed_step)
    ) }

    UPDATE_DELAYED_GCODE ID=_PROBE_SPEED_LOOP DURATION=0.01


# ─────────────────────────────────────────────────────────────────────────────
# SPEED SCAN — loop
# ─────────────────────────────────────────────────────────────────────────────
[delayed_gcode _PROBE_SPEED_LOOP]
initial_duration: 0
gcode:
    {% set debug    = printer["gcode_macro _User_Variables"].debug if "gcode_macro _User_Variables" in printer else True %}
    {% set state    = printer["gcode_macro _PROBE_SCAN_STATE"] %}
    {% set speed    = state.current_speed %}
    {% set f        = speed * 60 %}
    {% set max_y    = state.max_y %}
    {% set dock_x   = state.dock_x %}
    {% set x_speed  = printer.configfile.settings.stepper_x.homing_speed * 60 %}
    {% set undock_f = state.dock_speed * 60 %} # <--- Pulls the 50mm/s base speed

    {% if speed > state.speed_end %}
        { action_raise_error(
            "Speed scan exhausted — probe did not attach at any speed up to %.0f mm/s. Check dock alignment."
            % state.speed_end
        ) }
    {% else %}
        {% if debug %}
            { action_respond_info("Speed test: %.0f mm/s (F%.0f)" % (speed, f)) }
        {% endif %}
        G0 X{dock_x} Y{max_y - 20} F{x_speed}
        G0 X{dock_x} Y{max_y}      F{f}
        QUERY_PROBE
        QUERY_PROBE
        G0 X{dock_x} Y{max_y - 20} F{undock_f}   # <--- Undock at 50mm/s
        _PROBE_SPEED_CHECK
    {% endif %}


[gcode_macro _PROBE_SPEED_CHECK]
gcode:
    {% set debug = printer["gcode_macro _User_Variables"].debug if "gcode_macro _User_Variables" in printer else True %}
    {% set state = printer["gcode_macro _PROBE_SCAN_STATE"] %}
    {% set speed = state.current_speed %}

    {% if printer.probe.last_query == 0 %}
        _PROBE_SPEED_REPORT
    {% else %}
        {% if debug %}
            { action_respond_info("Speed test: probe not attached at %.0f mm/s — increasing..." % speed) }
        {% endif %}
        SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=current_speed VALUE={speed + state.speed_step}
        UPDATE_DELAYED_GCODE ID=_PROBE_SPEED_LOOP DURATION=0.01
    {% endif %}


# ─────────────────────────────────────────────────────────────────────────────
# SPEED REPORT — saves dock_speed to runtime state
# ─────────────────────────────────────────────────────────────────────────────
[gcode_macro _PROBE_SPEED_REPORT]
gcode:
    {% set state      = printer["gcode_macro _PROBE_SCAN_STATE"] %}
    {% set min_speed  = state.current_speed %}
    {% set dock_speed = min_speed + 15.0 %}

    SET_GCODE_VARIABLE MACRO=_PROBE_SCAN_STATE VARIABLE=dock_speed VALUE={dock_speed}

    { action_respond_info(
        "━━━ Speed Scan Complete ━━━\n"
        "Min attach speed : %.0f mm/s\n"
        "Speed margin     : +15 mm/s\n"
        "dock_speed       : %.0f mm/s\n"
        "\n"
        "Set the following in your klicky-variables.cfg:\n"
        "variable_dock_speed: %.0f\n"
        "━━━━━━━━━━━━━━━━━━━━━━━━━━" % (min_speed, dock_speed, dock_speed)
    ) }