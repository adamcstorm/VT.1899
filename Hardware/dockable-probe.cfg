[dockable_probe]

################################
# CHANGE HERE  
################################

# pin: pth:gpio13

approach_position: 209.00, 295.00
dock_position:     209.00, 315.00
extract_position:  227.00, 315.00
detach_position:   209.00, 295.000

################################
# THESE SETTINGS YOU CAN CHANGE 
################################

x_offset: 0
y_offset: 0
# z_offset: 19.820
z_hop: 30
sample_retract_dist: 1
speed: 8
lift_speed: 8

samples: 2
samples_result: median
sample_retract_dist: 2

samples_tolerance: 0.01
samples_tolerance_retries: 10

pre_attach_gcode: _PROBE_FAN_BOOST
post_detach_gcode: _PROBE_FAN_RESTORE

check_open_attach: True
drop_first_result: True

attach_speed: 50
detach_speed: 50
travel_speed: 200

[bed_mesh]
speed: 300
horizontal_move_z: 22

mesh_min: 40, 40
mesh_max: 260,260
zero_reference_position: 150,150 #for use with stock z endstop

fade_start: 0.6
fade_end: 10.0
probe_count: 7,7 # Values should be odd, so one point is directly at bed center
algorithm: bicubic

################################
# DONT CHANGE BELOW THIS LINE  
################################

[homing_override]
axes: xyz
set_position_z: 0
gcode:

  G90
  {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}

  {% if home_all or 'X' in params %}
    G0 Z10
    G28 X
  {% endif %}

  {% if home_all or 'Y' in params %}
    G0 Z10
    G28 Y
  {% endif %}

  {% if home_all or 'Z' in params %}
    ATTACH_PROBE
    MOVE_AVOIDING_DOCK X=150 Y=150 SPEED=300
    # Probe is already attached, no need to make a return trip to the dock.
    G28 Z  
  {% endif %}

[gcode_macro Attach_Probe_Lock]
gcode:
  SET_DOCKABLE_PROBE AUTO_ATTACH_DETACH=0
  ATTACH_PROBE                             

[gcode_macro Dock_Probe_Unlock]
gcode:
  DETACH_PROBE                             
  SET_DOCKABLE_PROBE AUTO_ATTACH_DETACH=1

[gcode_macro Dock_Probe]
gcode:
  DETACH_PROBE                             


[gcode_macro _PROBE_FAN_BOOST]
description: Boosts part fan and cools hotend if too hot to protect probe
variable_temp_threshold: 75
variable_temp_cooldown: 150
variable_fan_override_pct: 100
variable_saved_fan_speed: 0.0
variable_saved_extruder_temp: 0.0
variable_is_overridden: False
variable_is_temp_overridden: False
variable_is_fan_overridden: False
gcode:
    {% if not is_overridden %}
        # Capture the original target locally so we can use it throughout this run safely
        {% set original_target = printer.extruder.target %}
        
        # 1. Save current fan speed and extruder target temperature to macro state for later
        SET_GCODE_VARIABLE MACRO=_PROBE_FAN_BOOST VARIABLE=saved_fan_speed VALUE={printer.fan.speed}
        SET_GCODE_VARIABLE MACRO=_PROBE_FAN_BOOST VARIABLE=saved_extruder_temp VALUE={original_target}

        # 2. Check if nozzle temperature is above the cooldown threshold (150)
        {% if original_target > temp_cooldown %}
            { action_respond_info("Nozzle is cooling down to %dC to protect the probe." % temp_cooldown) }
            M104 S{temp_cooldown} ; Set target to 150
            TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={temp_cooldown} ; Wait until temp drops to 150

            # Set a dedicated flag indicating WE changed the temperature
            SET_GCODE_VARIABLE MACRO=_PROBE_FAN_BOOST VARIABLE=is_temp_overridden VALUE=True
        {% elif printer.extruder.temperature > temp_cooldown %}
            { action_respond_info("Nozzle is cooling down to %dC to protect the probe." % temp_cooldown) }
            M104 S{temp_cooldown} ; Set target to 150
            TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={temp_cooldown} ; Wait until temp drops to 150
            M104 S{original_target} ; Restores original target (e.g., 0) without blocking
        {% endif %}

        # 3. Check if hotend is above the fan boost threshold (75)
        {% if original_target > temp_threshold or printer.extruder.temperature > temp_threshold %}
            # Convert percentage (0-100) to PWM (0-255)
            {% set override_pwm = (fan_override_pct / 100.0) * 255 %}
            M106 S{override_pwm|int}
            
            # Set a dedicated flag indicating WE changed the fan
            SET_GCODE_VARIABLE MACRO=_PROBE_FAN_BOOST VARIABLE=is_fan_overridden VALUE=True
        {% endif %}

        # Set the master lock flag so we don't accidentally double-save states
        SET_GCODE_VARIABLE MACRO=_PROBE_FAN_BOOST VARIABLE=is_overridden VALUE=True
    {% endif %}
 
[gcode_macro _PROBE_FAN_RESTORE]
description: Restores part fan speed and extruder temperature
gcode:
    # 1. Restore the Fan
    {% if printer["gcode_macro _PROBE_FAN_BOOST"].is_fan_overridden %}
        {% set saved_speed = printer["gcode_macro _PROBE_FAN_BOOST"].saved_fan_speed %}
        {% set fan_override_pct = printer["gcode_macro _PROBE_FAN_BOOST"].fan_override_pct | int %}
        # Convert Klipper's 0.0-1.0 fan speed float back into a clean 0-100 integer
        {% set current_fan_pct = (printer.fan.speed * 100) | round(0) | int %}

        # Only restore if the current fan speed is exactly what we boosted it to
        {% if current_fan_pct == fan_override_pct %}
            {% set restore_pwm = saved_speed * 255 %}
            M106 S{restore_pwm|int}
        {% else %}
            { action_respond_info("Fan speed was changed manually. Skipping fan restore.") }
        {% endif %}

        # Reset the fan flag
        SET_GCODE_VARIABLE MACRO=_PROBE_FAN_BOOST VARIABLE=is_fan_overridden VALUE=False
    {% endif %}

    # 2. Restore the Temperature
    {% if printer["gcode_macro _PROBE_FAN_BOOST"].is_temp_overridden %}
        {% set saved_temp = printer["gcode_macro _PROBE_FAN_BOOST"].saved_extruder_temp %}
        {% set current_target = printer.extruder.target %}
        {% set temp_cooldown = printer["gcode_macro _PROBE_FAN_BOOST"].temp_cooldown %}

        # Only restore if the current target is exactly what we set it to (150).
        {% if current_target == temp_cooldown %}
            {% if saved_temp > 50 %}
                { action_respond_info("Restoring and waiting for nozzle temperature to %.0fC." % saved_temp) }
                M104 S{saved_temp} ; Set target
                # Wait for temp to restore (giving a 1 degree grace window)
                TEMPERATURE_WAIT SENSOR=extruder MINIMUM={saved_temp - 1} 
            {% else %}
                { action_respond_info("Restoring nozzle target to %.0fC." % saved_temp) }
                M104 S{saved_temp} ; Set temp without blocking
            {% endif %}
        {% else %}
            { action_respond_info("Target temperature was changed manually. Skipping temperature restore.") }
        {% endif %}

        # Reset the temperature flag
        SET_GCODE_VARIABLE MACRO=_PROBE_FAN_BOOST VARIABLE=is_temp_overridden VALUE=False
    {% endif %}

    # 3. Unlock the master macro state
    {% if printer["gcode_macro _PROBE_FAN_BOOST"].is_overridden %}
        SET_GCODE_VARIABLE MACRO=_PROBE_FAN_BOOST VARIABLE=is_overridden VALUE=False
    {% endif %}